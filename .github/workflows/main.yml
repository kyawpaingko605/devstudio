name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # ✅ gradlew ကို ပြန်လည်ထုတ်ပါ
    - name: Setup Gradle Wrapper
      run: |
        # gradlew ဟောင်းကိုဖျက်ပါ
        rm -f gradlew
        rm -rf gradle/wrapper/
        
        # gradle wrapper ကို ပြန်ထုတ်ပါ
        gradle wrapper --gradle-version 8.7

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ✅ debug.keystore generate လုပ်ပါ
    - name: Generate debug keystore
      run: |
        keytool -genkey -v -keystore app/debug.keystore \
          -alias androiddebugkey \
          -keyalg RSA \
          -keysize 2048 \
          -validity 10000 \
          -storepass android \
          -keypass android \
          -dname "CN=Debug, OU=Debug, O=Debug, L=City, ST=State, C=US"

    - name: Run code analysis and tests
      run: ./gradlew lint testReleaseUnitTest --no-daemon

    - name: Build debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
