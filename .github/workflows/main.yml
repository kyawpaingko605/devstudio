name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    # Gradle Version ကို 8.7 သို့ တိုးမြှင့်ပြီး အလိုအလျောက် ဆောက်ခိုင်းမည်
    - name: Generate Gradle Wrapper Automatically
      run: |
        npm install -g gradle
        gradle wrapper --gradle-version 8.7

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Error စစ်ဆေးရန် (Lint & Unit Tests)
    - name: Run Code Analysis and Tests
      run: ./gradlew lint testReleaseUnitTest

    # APK Build ထုတ်ရန် (ဖုန်းထဲသွင်းလို့ရအောင် assembleDebug သို့ ပြောင်းလဲထားပါသည်)
    - name: Build Android APK
      run: ./gradlew assembleDebug

    # ထွက်လာမယ့် Debug APK ကို သိမ်းဆည်းရန်
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/*.apk
